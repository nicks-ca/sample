<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | GTA Rent</title>
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #a1a1a1;
            --bg: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Abstract coded background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 100% 100%, #1a1a1a 0%, #0a0a0a 100%);
            z-index: -2;
        }

        /* Abstract coded CN Tower representation */
        .cn-tower {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 3px;
            height: 85vh;
            background-color: #1a1a1a; /* Very dark gray */
            transform: translateX(-50%);
            z-index: -1;
            opacity: 0.6;
        }
        
        /* The main "pod" */
        .cn-tower::before {
            content: '';
            position: absolute;
            bottom: 75vh;
            left: 50%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #1a1a1a;
            transform: translateX(-50%);
        }

        /* The antenna spire */
        .cn-tower::after {
            content: '';
            position: absolute;
            bottom: 78vh;
            left: 50%;
            width: 1px;
            height: 7vh;
            background-color: #1a1a1a;
            transform: translateX(-50%);
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            position: relative; /* ensure text is above background objects */
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--secondary);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--secondary);
            margin-bottom: 32px;
        }

        .highlight {
            color: var(--primary);
            font-weight: 500;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            color: #444;
        }

        /* Simple fade-in animation */
        .animate {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="cn-tower"></div> <div class="container animate">
        <div class="badge">Greater Toronto Area</div>
        <h1>Something better is moving in.</h1>
        <p>
            From the downtown core to the edges of the Greenbelt, we are redefining how the <span class="highlight">GTA rents</span>. No more ghost listings. No more endless searching.
        </p>
        <p style="font-size: 1.3rem; color: #fff;">
            <strong>Coming Soon. Stay tuned.</strong>
        </p>
    </div>

    <div class="footer animate" style="animation-delay: 0.5s;">
        &copy; 2026 GTA Rent. All rights reserved.
    </div>

</body>
</html>
